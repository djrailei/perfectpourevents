 <body data-template-id="__page-root" class="min-h-screen text-white w-full" style="background: rgb(9, 9, 11);"><!-- Hero -->

  </header>
  <main class="w-full max-w-[1200px] mx-auto px-6 md:px-10 py-16"><!-- Drink Selector -->

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4" id="drink-selector-grid"><label class="drink-check-item"><input type="checkbox" class="planner-drink" checked="" data-id="mule" data-name="Moscow Mule" data-ingredients="Vodka, Lime Juice, Ginger Beer" data-method="Built over crushed ice in a copper vessel."><span class="text-sm">Moscow Mule</span></label> <label class="drink-check-item"><input type="checkbox" class="planner-drink" checked="" data-id="lavender" data-name="Lake Shore Lavender" data-ingredients="Premium Vodka, Lavender Syrup, Lemon Juice, Club Soda" data-method="Shaken, double-strained into a coupe."><span class="text-sm">Lake Shore Lavender</span></label> <label class="drink-check-item"><input type="checkbox" class="planner-drink" data-id="margarita" data-name="Classic Margarita" data-ingredients="Blanco Tequila, Fresh Lime, Cointreau, Agave Nectar" data-method="Hard shaken, served over ice with a salted rim."><span class="text-sm">Classic Margarita</span></label> <label class="drink-check-item"><input type="checkbox" class="planner-drink" data-id="paloma" data-name="The Ruby Paloma" data-ingredients="Reposado Tequila, Ruby Grapefruit, Lime, Rosemary, Grapefruit Soda" data-method="Built long over ice with a torched rosemary sprig."><span class="text-sm">The Ruby Paloma</span></label> <label class="drink-check-item"><input type="checkbox" class="planner-drink" data-id="oldfashioned" data-name="Bespoke Old Fashioned" data-ingredients="Small Batch Bourbon, Angostura Bitters, Demerara Sugar" data-method="Muddled in crystal glassware with a frozen ice sphere."><span class="text-sm">Old Fashioned</span></label> <label class="drink-check-item"><input type="checkbox" class="planner-drink" data-id="chicagosmoke" data-name="The Chicago Smoke" data-ingredients="Rye Whiskey, Sweet Vermouth, Ancho Reyes Chile Liqueur" data-method="Stirred, strained into a glass infused with aromatic woodsmoke."><span class="text-sm">The Chicago Smoke</span></label>
    </div>
   </section><!-- Tools Grid -->
   <div class="grid md:grid-cols-2 gap-8"><!-- PDF Menu Creator -->
    <div class="glass-card p-8">
     <h3 data-template-id="pdf-menu-title" class="canva-text font-display text-xl mb-6" style="color: rgb(212, 175, 55); font-weight: 600; font-style: normal; font-size: 20px;">PDF Menu Creator</h3><label data-template-id="event-name-label" class="canva-text text-[10px] uppercase tracking-widest font-semibold mb-2 block" for="party-title-input" style="color: rgb(212, 175, 55); font-weight: 600; font-style: normal; font-size: 10px;">Custom Event Header</label> <input type="text" id="party-title-input" placeholder="e.g., The Henderson Gala" class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:border-[#d4af37] focus:outline-none transition mb-4"> <button id="btn-pdf-menu" type="button" class="btn-gold w-full text-sm">✨ Download Print Menu PDF</button>
    </div><!-- Shopping List Estimator -->
    <div class="glass-card p-8">
     <h3 data-template-id="estimator-title" class="canva-text font-display text-xl mb-6" style="color: rgb(212, 175, 55); font-weight: 600; font-style: normal; font-size: 20px;">Ingredient Estimator</h3>
     <div class="grid grid-cols-2 gap-3 mb-4">
      <div><label data-template-id="guests-label" class="canva-text text-[10px] uppercase tracking-widest font-semibold mb-2 block" for="guest-count-input" style="color: rgb(212, 175, 55); font-weight: 600; font-style: normal; font-size: 10px;">Expected Guests</label> <input type="number" id="guest-count-input" value="50" min="1" class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:border-[#d4af37] focus:outline-none transition">
      </div>
      <div><label data-template-id="dpg-label" class="canva-text text-[10px] uppercase tracking-widest font-semibold mb-2 block" for="drinks-per-guest" style="color: rgb(212, 175, 55); font-weight: 600; font-style: normal; font-size: 10px;">Drinks Per Guest</label> <input type="number" id="drinks-per-guest" value="3" min="1" class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:border-[#d4af37] focus:outline-none transition">
      </div>
     </div>
     <div class="bg-black/40 rounded-xl p-4 min-h-[100px] border border-white/[0.06] text-sm max-h-48 overflow-y-auto mb-4" id="shopping-list-display"></div><button id="btn-pdf-shopping" type="button" class="btn-outline w-full">📋 Download Shopping List PDF</button>
    </div>
   </div>

   <p data-template-id="footer-brand" class="canva-text font-display text-xl font-semibold mb-2" style="color: rgb(250, 250, 250); font-weight: 600; font-style: normal; font-size: 16px;">The Windy City Pour</p>
   <p data-template-id="footer-copy" class="canva-text text-xs tracking-wider" style="color: rgb(75, 85, 99); font-weight: 400; font-style: normal; font-size: 12px;">© 2026 The Windy City Pour. All Rights Reserved.</p>
  </footer><!-- Hidden PDF targets -->
  <div id="pdf-render-hidden-target">
   <div id="luxury-pdf-canvas" style="background:#fff;color:#111;padding:50px 45px;font-family:'Montserrat',sans-serif;">
    <div style="text-align:center;border-bottom:2px solid #c9a03b;padding-bottom:20px;margin-bottom:40px;">
     <h1 id="pdf-h1-target" style="font-family:'Playfair Display',serif;font-size:28pt;font-weight:700;color:#111;margin-bottom:6px;">The Event Bar</h1>
     <p style="text-transform:uppercase;font-size:8.5pt;letter-spacing:2px;color:#666;margin:0;">Exquisite Mobile Bar Curation • The Windy City Pour</p>

    <div id="pdf-drinks-destination"></div>
   </div>
   <div id="shopping-pdf-canvas" style="background:#fff;color:#111;padding:50px 45px;font-family:'Montserrat',sans-serif;">
    <div style="border-bottom:2px solid #111;padding-bottom:15px;margin-bottom:30px;">
     <h1 style="font-family:'Playfair Display',serif;font-size:22pt;font-weight:700;color:#111;margin-bottom:4px;">Bar Supply Shopping Checklist</h1>
     <p id="pdf-shopping-meta" style="font-size:9pt;text-transform:uppercase;color:#666;letter-spacing:1px;margin:0;"></p>
    </div>
    <div id="pdf-shopping-items-destination"></div>
   </div>
  </div>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    const drinkRecipes = {
      mule: { "Vodka (750ml bottles)": 2.0/25.4, "Fresh Lime Juice (oz)": 0.5, "Ginger Beer (cans)": 0.33 },
      lavender: { "Vodka (750ml bottles)": 2.0/25.4, "Lavender Syrup (oz)": 0.75, "Fresh Lemon Juice (oz)": 0.75, "Club Soda (cans)": 0.25 },
      margarita: { "Blanco Tequila (750ml bottles)": 2.0/25.4, "Fresh Lime Juice (oz)": 1.0, "Cointreau (750ml)": 0.75/25.4, "Agave Nectar (oz)": 0.25 },
      paloma: { "Reposado Tequila (750ml bottles)": 2.0/25.4, "Grapefruit Juice (oz)": 1.5, "Fresh Lime Juice (oz)": 0.5, "Grapefruit Soda (cans)": 0.5 },
      oldfashioned: { "Bourbon (750ml bottles)": 2.0/25.4, "Angostura Bitters (bottles)": 0.02, "Sugar Cubes (qty)": 1.0 },
      chicagosmoke: { "Rye Whiskey (750ml bottles)": 2.0/25.4, "Sweet Vermouth (750ml)": 0.5/25.4, "Ancho Reyes (750ml)": 0.25/25.4 }
    };

    function getSelectedDrinks() { return document.querySelectorAll('.planner-drink:checked'); }

    function calculateInventory() {
      const guests = parseInt(document.getElementById('guest-count-input').value) || 0;
      const dpg = parseInt(document.getElementById('drinks-per-guest').value) || 0;
      const total = guests * dpg;
      const active = getSelectedDrinks();
      const consolidated = {};
      if (!active.length || !total) return consolidated;
      const perDrink = total / active.length;
      active.forEach(box => {
        const recipe = drinkRecipes[box.dataset.id];
        if (recipe) { for (let item in recipe) { consolidated[item] = (consolidated[item] || 0) + recipe[item] * perDrink; } }
      });
      return consolidated;
    }

    function recalculateShoppingList() {
      const container = document.getElementById('shopping-list-display');
      const consolidated = calculateInventory();
      if (!Object.keys(consolidated).length) {
        container.innerHTML = '<p style="color:#666;font-size:0.85rem;font-style:italic;">Select cocktails and set guest count to see estimates.</p>';
        return;
      }
      container.innerHTML = '';
      for (let item in consolidated) {
        const val = consolidated[item];
        const formatted = (item.includes('bottles') || item.includes('cans') || item.includes('qty')) ? Math.ceil(val) : val.toFixed(1) + ' oz';
        container.innerHTML += `<div class="shopping-item"><span>${item}</span><span class="qty">${formatted}</span></div>`;
      }
    }

    document.getElementById('btn-pdf-menu').addEventListener('click', () => {
      const selected = getSelectedDrinks();
      if (!selected.length) return;
      const title = document.getElementById('party-title-input').value.trim() || 'Featured Cocktail Menu';
      document.getElementById('pdf-h1-target').innerText = title;
      const dest = document.getElementById('pdf-drinks-destination');
      dest.innerHTML = '';
      selected.forEach(box => {
        dest.innerHTML += `<div style="margin-bottom:30px;"><h3 style="font-family:'Playfair Display',serif;font-size:16pt;font-weight:700;color:#bc9331;margin-bottom:4px;font-style:italic;">${box.dataset.name}</h3><p style="font-size:10pt;color:#222;margin-bottom:6px;">${box.dataset.ingredients}</p><p style="font-size:9pt;color:#666;">${box.dataset.method}</p></div>`;
      });
      html2pdf().set({ margin: 15, filename: 'cocktail_menu.pdf', html2canvas: { scale: 1.5, backgroundColor: '#ffffff' }, jsPDF: { unit: 'mm', format: 'a4' } }).from(document.getElementById('luxury-pdf-canvas')).save();
    });

    document.getElementById('btn-pdf-shopping').addEventListener('click', () => {
      const consolidated = calculateInventory();
      if (!Object.keys(consolidated).length) return;
      const guests = document.getElementById('guest-count-input').value;
      const dpg = document.getElementById('drinks-per-guest').value;
      const partyTitle = document.getElementById('party-title-input').value.trim() || 'Your Event';
      document.getElementById('pdf-shopping-meta').innerText = `${guests} Guests · ${dpg} Drinks Per Guest · ${partyTitle}`;
      const dest = document.getElementById('pdf-shopping-items-destination');
      dest.innerHTML = '';
      for (let item in consolidated) {
        const val = consolidated[item];
        const formatted = (item.includes('bottles') || item.includes('cans') || item.includes('qty')) ? Math.ceil(val) : val.toFixed(1) + ' oz';
        dest.innerHTML += `<div style="display:flex;justify-content:space-between;padding:12px 5px;border-bottom:1px solid #ddd;font-size:11pt;"><span>☐ ${item}</span><span style="font-weight:600;">${formatted}</span></div>`;
      }
      html2pdf().set({ margin: 15, filename: 'bar_shopping_list.pdf', html2canvas: { scale: 1.5, backgroundColor: '#ffffff' }, jsPDF: { unit: 'mm', format: 'a4' } }).from(document.getElementById('shopping-pdf-canvas')).save();
    });

    document.querySelectorAll('.planner-drink').forEach(box => box.addEventListener('change', recalculateShoppingList));
    document.getElementById('guest-count-input').addEventListener('input', recalculateShoppingList);
    document.getElementById('drinks-per-guest').addEventListener('input', recalculateShoppingList);
    recalculateShoppingList();
  </script>
